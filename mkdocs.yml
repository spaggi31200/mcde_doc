site_name: (3,1)-MCDE documentation
theme:
  name: material

  palette:
    - scheme: slate
      primary: blue
      accent: indigo
     
plugins:
- search
- mkdocstrings:
    handlers:
      python:
        paths:
         - src
        options:
          members_order: alphabetical
          show_root_heading: true
          show_root_toc_entry: true
          show_symbol_type_toc: true
          show_if_no_docstring: true
          heading_level: 2
          members: true
          show_submodules: true
          filters: ["!^_"]
          
markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js

nav:
  - Home: index.md
  - About: about.md
  - API: api.md